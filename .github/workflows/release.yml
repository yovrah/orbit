name: Build Windows release

# Push a version tag to build the standalone app and publish a GitHub Release:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install agent dependencies
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Package agent (PyInstaller)
        working-directory: agent
        run: pyinstaller --clean --noconfirm orbit.spec

      - name: Zip release
        shell: pwsh
        run: Compress-Archive -Path agent/dist/Orbit/* -DestinationPath Orbit-windows.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Orbit-windows.zip
          generate_release_notes: true
